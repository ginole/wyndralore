<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 640" width="400" height="640">
  <defs>
    <radialGradient id="lmBg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#141830"/>
      <stop offset="55%" stop-color="#0e1222"/>
      <stop offset="100%" stop-color="#090c17"/>
    </radialGradient>
    <radialGradient id="lmHalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e4c894" stop-opacity="0.16"/>
      <stop offset="55%" stop-color="#e4c894" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#e4c894" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lmGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d9b87f"/>
      <stop offset="50%" stop-color="#f0dcae"/>
      <stop offset="100%" stop-color="#c9a96e"/>
    </linearGradient>
    <filter id="lmGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- corner filigree: drawn for top-left, reused rotated -->
    <g id="lmCorner">
      <path d="M34 92 Q34 34 92 34" fill="none" stroke="#c9a96e" stroke-width="1.4"/>
      <path d="M40 108 Q40 40 108 40" fill="none" stroke="#c9a96e" stroke-width="0.6" opacity="0.55"/>
      <path d="M92 34 Q78 44 84 56 Q90 66 78 70 Q66 73 70 62 Q73 55 66 52" fill="none" stroke="#c9a96e" stroke-width="1" opacity="0.9"/>
      <path d="M34 92 Q44 78 56 84 Q66 90 70 78 Q73 66 62 70 Q55 73 52 66" fill="none" stroke="#c9a96e" stroke-width="1" opacity="0.9"/>
      <circle cx="47" cy="47" r="3.4" fill="none" stroke="#e4c894" stroke-width="1"/>
      <circle cx="47" cy="47" r="1.1" fill="#f0dcae"/>
      <path d="M60 60 l4 4 -4 4 -4 -4 Z" fill="#e4c894" opacity="0.9"/>
    </g>

    <!-- one ray pair of the central burst -->
    <g id="lmRay">
      <line x1="0" y1="-118" x2="0" y2="-138" stroke="#c9a96e" stroke-width="1.4" stroke-linecap="round"/>
    </g>
    <g id="lmRayS">
      <line x1="0" y1="-114" x2="0" y2="-126" stroke="#c9a96e" stroke-width="0.7" stroke-linecap="round" opacity="0.6"/>
    </g>

    <!-- small 4-point star -->
    <g id="lmStar4">
      <path d="M0 -6 Q1.2 -1.2 6 0 Q1.2 1.2 0 6 Q-1.2 1.2 -6 0 Q-1.2 -1.2 0 -6 Z" fill="#e4c894"/>
    </g>
  </defs>

  <!-- ground -->
  <rect width="400" height="640" fill="url(#lmBg)"/>
  <ellipse cx="200" cy="320" rx="205" ry="260" fill="url(#lmHalo)"/>

  <!-- frame -->
  <rect x="12" y="12" width="376" height="616" fill="none" stroke="url(#lmGold)" stroke-width="2.2"/>
  <rect x="19" y="19" width="362" height="602" fill="none" stroke="#c9a96e" stroke-width="0.7" opacity="0.6"/>
  <rect x="26" y="26" width="348" height="588" fill="none" stroke="#c9a96e" stroke-width="0.45" opacity="0.3"/>

  <!-- corner filigree, 180-degree symmetric set -->
  <g filter="url(#lmGlow)">
    <use href="#lmCorner"/>
    <use href="#lmCorner" transform="translate(400 0) scale(-1 1)"/>
    <use href="#lmCorner" transform="rotate(180 200 320)"/>
    <use href="#lmCorner" transform="translate(400 0) scale(-1 1) rotate(180 200 320)"/>
  </g>

  <!-- moon phase arcs, mirrored top/bottom for reversibility -->
  <g filter="url(#lmGlow)">
    <g id="lmPhases">
      <circle cx="128" cy="112" r="7" fill="none" stroke="#c9a96e" stroke-width="0.8" opacity="0.6"/>
      <path d="M128 105 A7 7 0 0 1 128 119 A4.5 7 0 0 0 128 105 Z" fill="#c9a96e" opacity="0.75"/>
      <circle cx="164" cy="104" r="7" fill="none" stroke="#c9a96e" stroke-width="0.8" opacity="0.6"/>
      <path d="M164 97 A7 7 0 0 1 164 111 A0.5 7 0 0 0 164 97 Z" fill="#c9a96e" opacity="0.75"/>
      <circle cx="200" cy="101" r="8" fill="#c9a96e" opacity="0.8"/>
      <circle cx="200" cy="101" r="10.5" fill="none" stroke="#e4c894" stroke-width="0.7" opacity="0.5"/>
      <circle cx="236" cy="104" r="7" fill="none" stroke="#c9a96e" stroke-width="0.8" opacity="0.6"/>
      <path d="M236 97 A7 7 0 0 0 236 111 A0.5 7 0 0 1 236 97 Z" fill="#c9a96e" opacity="0.75"/>
      <circle cx="272" cy="112" r="7" fill="none" stroke="#c9a96e" stroke-width="0.8" opacity="0.6"/>
      <path d="M272 105 A7 7 0 0 0 272 119 A4.5 7 0 0 1 272 105 Z" fill="#c9a96e" opacity="0.75"/>
    </g>
    <use href="#lmPhases" transform="rotate(180 200 320)"/>
  </g>

  <!-- central mandala -->
  <g filter="url(#lmGlow)">
    <!-- outer rings -->
    <circle cx="200" cy="320" r="150" fill="none" stroke="#c9a96e" stroke-width="1.3" opacity="0.85"/>
    <circle cx="200" cy="320" r="143" fill="none" stroke="#c9a96e" stroke-width="0.5" opacity="0.5"/>
    <circle cx="200" cy="320" r="128" fill="none" stroke="#c9a96e" stroke-width="0.6" opacity="0.45" stroke-dasharray="1 5"/>

    <!-- sun burst rays -->
    <g transform="translate(200 320)">
      <use href="#lmRay"/><use href="#lmRay" transform="rotate(30)"/><use href="#lmRay" transform="rotate(60)"/>
      <use href="#lmRay" transform="rotate(90)"/><use href="#lmRay" transform="rotate(120)"/><use href="#lmRay" transform="rotate(150)"/>
      <use href="#lmRay" transform="rotate(180)"/><use href="#lmRay" transform="rotate(210)"/><use href="#lmRay" transform="rotate(240)"/>
      <use href="#lmRay" transform="rotate(270)"/><use href="#lmRay" transform="rotate(300)"/><use href="#lmRay" transform="rotate(330)"/>
      <use href="#lmRayS" transform="rotate(15)"/><use href="#lmRayS" transform="rotate(45)"/><use href="#lmRayS" transform="rotate(75)"/>
      <use href="#lmRayS" transform="rotate(105)"/><use href="#lmRayS" transform="rotate(135)"/><use href="#lmRayS" transform="rotate(165)"/>
      <use href="#lmRayS" transform="rotate(195)"/><use href="#lmRayS" transform="rotate(225)"/><use href="#lmRayS" transform="rotate(255)"/>
      <use href="#lmRayS" transform="rotate(285)"/><use href="#lmRayS" transform="rotate(315)"/><use href="#lmRayS" transform="rotate(345)"/>
    </g>

    <!-- petal ring -->
    <g transform="translate(200 320)" fill="none" stroke="#c9a96e" stroke-width="0.9" opacity="0.8">
      <g id="lmPetal">
        <path d="M0 -108 Q14 -88 0 -68 Q-14 -88 0 -108 Z"/>
      </g>
      <use href="#lmPetal" transform="rotate(45)"/>
      <use href="#lmPetal" transform="rotate(90)"/>
      <use href="#lmPetal" transform="rotate(135)"/>
      <use href="#lmPetal" transform="rotate(180)"/>
      <use href="#lmPetal" transform="rotate(225)"/>
      <use href="#lmPetal" transform="rotate(270)"/>
      <use href="#lmPetal" transform="rotate(315)"/>
    </g>
    <circle cx="200" cy="320" r="108" fill="none" stroke="#c9a96e" stroke-width="0.8" opacity="0.6"/>

    <!-- eclipse: sun disc + twin crescents (180-degree symmetric) -->
    <circle cx="200" cy="320" r="56" fill="none" stroke="url(#lmGold)" stroke-width="1.6"/>
    <circle cx="200" cy="320" r="48" fill="#c9a96e" opacity="0.1"/>
    <path d="M200 272 A48 48 0 0 1 200 368 A30 48 0 0 0 200 272 Z" fill="#c9a96e" opacity="0.5"/>
    <path d="M200 368 A48 48 0 0 1 200 272 A30 48 0 0 0 200 368 Z" fill="#c9a96e" opacity="0.5" transform="rotate(180 200 320)"/>
    <circle cx="200" cy="320" r="48" fill="none" stroke="#e4c894" stroke-width="0.9" opacity="0.9"/>

    <!-- octagram core -->
    <g transform="translate(200 320)">
      <path d="M0 -30 L7.5 -7.5 L30 0 L7.5 7.5 L0 30 L-7.5 7.5 L-30 0 L-7.5 -7.5 Z" fill="#0e1222" stroke="#f0dcae" stroke-width="1.3"/>
      <path d="M0 -30 L7.5 -7.5 L30 0 L7.5 7.5 L0 30 L-7.5 7.5 L-30 0 L-7.5 -7.5 Z" fill="none" stroke="#f0dcae" stroke-width="1.3" transform="rotate(45)"/>
      <circle r="6" fill="#f0dcae"/>
    </g>
  </g>

  <!-- scattered stars, placed in 180-degree symmetric pairs -->
  <g filter="url(#lmGlow)" opacity="0.85">
    <g id="lmStars">
      <use href="#lmStar4" transform="translate(74 170) scale(0.8)"/>
      <use href="#lmStar4" transform="translate(322 148) scale(0.62)"/>
      <use href="#lmStar4" transform="translate(96 236) scale(0.5)"/>
      <use href="#lmStar4" transform="translate(318 250) scale(0.72)"/>
      <use href="#lmStar4" transform="translate(60 320) scale(0.6)"/>
      <circle cx="118" cy="140" r="1.3" fill="#e4c894"/>
      <circle cx="292" cy="188" r="1.1" fill="#e4c894"/>
      <circle cx="76 " cy="270" r="1.2" fill="#e4c894"/>
      <circle cx="330" cy="300" r="1.0" fill="#e4c894"/>
    </g>
    <use href="#lmStars" transform="rotate(180 200 320)"/>
  </g>
</svg>
